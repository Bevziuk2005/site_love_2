<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>скоро побачимось</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    :root{
      --cream:#faf7f2;
      --ink:#2c2420;
      --ink-mid:#4a3f3a;
      --ink-soft:#7a6a62;
      --gold:#b8916a;
      --gold-lt:#d4b090;
      --rule:rgba(184,145,106,0.22);
    }

    html,body{height:100%;overflow:hidden}

    body{
      min-height:100dvh;
      background-color:var(--cream);
      font-family:'Cormorant Garamond',Georgia,serif;
      color:var(--ink);
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
      overflow:hidden;
    }

    /* Warm background layers */
    body::before{
      content:'';
      position:fixed;
      inset:0;
      background:
        radial-gradient(ellipse 100% 60% at 50% -10%, #f3e0cc 0%, transparent 65%),
        radial-gradient(ellipse 60% 50% at 95% 100%, #ecddd0 0%, transparent 55%),
        radial-gradient(ellipse 45% 40% at 5% 95%, #f0e6da 0%, transparent 55%);
      pointer-events:none;
      z-index:0;
    }

    /* Border frame */
    .frame{
      position:fixed;
      inset:14px;
      border:1px solid var(--rule);
      pointer-events:none;
      z-index:1;
    }

    /* Corner ornaments */
    .corner{
      position:fixed;
      width:32px;height:32px;
      z-index:2;
      opacity:0;
      animation:fadeIn 1.6s ease 0.5s forwards;
    }
    .corner svg{width:100%;height:100%}
    .corner--tl{top:20px;left:20px}
    .corner--tr{top:20px;right:20px;transform:scaleX(-1)}
    .corner--bl{bottom:20px;left:20px;transform:scaleY(-1)}
    .corner--br{bottom:20px;right:22px;transform:scale(-1)}

    /* Floating messages */
    .floater{
      position:fixed;
      pointer-events:none;
      z-index:3;
      font-family:'Cormorant Garamond',serif;
      font-style:italic;
      font-weight:300;
      font-size:clamp(13px,3.2vw,18px);
      color:rgba(150,100,65,0.72);
      white-space:nowrap;
      opacity:0;
      transition:opacity 1.2s ease;
      text-shadow:0 1px 8px rgba(250,247,242,0.9);
      user-select:none;
    }
    .floater.visible{opacity:1}

    /* Center card */
    .card{
      position:relative;
      z-index:10;
      display:flex;
      flex-direction:column;
      align-items:center;
      text-align:center;
      padding:clamp(24px,5vw,48px) clamp(24px,6vw,56px);
      background:rgba(250,247,242,0.6);
      backdrop-filter:blur(2px);
      -webkit-backdrop-filter:blur(2px);
      border:1px solid rgba(184,145,106,0.15);
      border-radius:2px;
      min-width:min(380px,88vw);
      max-width:min(480px,92vw);
      box-shadow:0 4px 40px rgba(180,130,90,0.08);
    }

    /* Lily */
    .lily{
      width:clamp(72px,18vw,110px);
      height:auto;
      margin-bottom:clamp(16px,4vw,28px);
      opacity:0;
      filter:drop-shadow(0 4px 14px rgba(140,90,50,0.18));
      animation:floatIn 1.4s cubic-bezier(.2,.8,.3,1) 0.6s forwards;
      user-select:none;
      pointer-events:none;
    }

    /* Label above timer */
    .label{
      font-family:'Jost',sans-serif;
      font-weight:300;
      font-size:clamp(9px,2.4vw,12px);
      letter-spacing:0.3em;
      text-transform:uppercase;
      color:var(--gold);
      margin-bottom:clamp(14px,3.5vw,22px);
      opacity:0;
      animation:fadeIn 1s ease 1.4s forwards;
    }

    /* Timer digits */
    .timer{
      display:flex;
      align-items:flex-end;
      gap:clamp(6px,2vw,14px);
      margin-bottom:clamp(16px,4vw,26px);
      opacity:0;
      animation:fadeIn 1s ease 1.7s forwards;
    }

    .timer-unit{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:4px;
    }

    .timer-digits{
      font-family:'Cormorant Garamond',serif;
      font-weight:300;
      font-size:clamp(38px,11vw,72px);
      line-height:1;
      letter-spacing:-0.02em;
      color:var(--ink);
      min-width:2ch;
      text-align:center;
    }

    .timer-sep{
      font-family:'Cormorant Garamond',serif;
      font-weight:300;
      font-size:clamp(28px,8vw,56px);
      line-height:1;
      color:var(--gold-lt);
      margin-bottom:clamp(14px,3.5vw,20px);
      opacity:0.7;
    }

    .timer-name{
      font-family:'Jost',sans-serif;
      font-weight:200;
      font-size:clamp(8px,2vw,10px);
      letter-spacing:0.22em;
      text-transform:uppercase;
      color:var(--gold-lt);
    }

    /* Divider */
    .divider{
      width:clamp(36px,10vw,56px);
      height:1px;
      background:linear-gradient(90deg,transparent,var(--gold),transparent);
      margin:clamp(12px,3vw,20px) 0;
      opacity:0;
      animation:fadeIn 1s ease 2.2s forwards;
    }

    /* Subtitle */
    .subtitle{
      font-style:italic;
      font-weight:300;
      font-size:clamp(16px,4.2vw,24px);
      color:var(--ink-mid);
      line-height:1.5;
      opacity:0;
      animation:fadeIn 1.2s ease 2.4s forwards;
    }

    /* Signature */
    .signature{
      margin-top:clamp(18px,4.5vw,30px);
      font-family:'Jost',sans-serif;
      font-weight:200;
      font-size:clamp(9px,2.4vw,12px);
      letter-spacing:0.28em;
      text-transform:uppercase;
      color:var(--gold-lt);
      opacity:0;
      animation:fadeIn 1s ease 2.8s forwards;
    }

    /* === CELEBRATION === */
    .celebration{
      position:fixed;inset:0;
      z-index:100;
      display:none;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      background:rgba(250,244,236,0.92);
      backdrop-filter:blur(6px);
    }
    .celebration.active{display:flex}
    .celebration-text{
      font-style:italic;
      font-size:clamp(28px,7vw,52px);
      font-weight:300;
      color:var(--ink);
      text-align:center;
      padding:0 32px;
      opacity:0;
      animation:scaleIn 1s cubic-bezier(.2,.8,.3,1) 0.3s forwards;
    }
    .celebration-sub{
      font-family:'Jost',sans-serif;
      font-weight:200;
      font-size:clamp(12px,3vw,16px);
      letter-spacing:0.24em;
      text-transform:uppercase;
      color:var(--gold);
      margin-top:20px;
      opacity:0;
      animation:fadeIn 1s ease 1.2s forwards;
    }
    .confetti-wrap{
      position:fixed;inset:0;
      pointer-events:none;
      overflow:hidden;
    }

    /* Keyframes */
    @keyframes fadeIn{to{opacity:1}}
    @keyframes floatIn{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
    @keyframes scaleIn{from{opacity:0;transform:scale(0.88)}to{opacity:1;transform:scale(1)}}
    @keyframes floatUp{
      0%{transform:translateY(0) rotate(var(--r));opacity:1}
      100%{transform:translateY(-100vh) rotate(calc(var(--r) + 360deg));opacity:0}
    }
    @keyframes pulse{0%,100%{opacity:0.6}50%{opacity:1}}

    /* Mobile */
    @media(max-width:360px){
      .corner--tl{top:14px;left:14px}
      .corner--tr{top:14px;right:14px}
      .corner--bl{bottom:14px;left:14px}
      .corner--br{bottom:14px;right:14px}
    }
    @media(max-height:560px) and (orientation:landscape){
      html,body{height:auto;overflow-y:auto}
      .card{padding:20px 28px}
      .lily{width:60px;margin-bottom:12px}
    }
  </style>
</head>
<body>

<div class="frame"></div>

<!-- Corners -->
<div class="corner corner--tl"><svg viewBox="0 0 32 32" fill="none"><path d="M2 16L2 2L16 2" stroke="rgba(184,145,106,0.5)" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/><circle cx="2" cy="2" r="1.4" fill="rgba(184,145,106,0.6)"/></svg></div>
<div class="corner corner--tr"><svg viewBox="0 0 32 32" fill="none"><path d="M2 16L2 2L16 2" stroke="rgba(184,145,106,0.5)" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/><circle cx="2" cy="2" r="1.4" fill="rgba(184,145,106,0.6)"/></svg></div>
<div class="corner corner--bl"><svg viewBox="0 0 32 32" fill="none"><path d="M2 16L2 2L16 2" stroke="rgba(184,145,106,0.5)" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/><circle cx="2" cy="2" r="1.4" fill="rgba(184,145,106,0.6)"/></svg></div>
<div class="corner corner--br"><svg viewBox="0 0 32 32" fill="none"><path d="M2 16L2 2L16 2" stroke="rgba(184,145,106,0.5)" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/><circle cx="2" cy="2" r="1.4" fill="rgba(184,145,106,0.6)"/></svg></div>

<!-- Floaters container -->
<div id="floaters"></div>

<!-- Center card -->
<div class="card">
  <svg class="lily" viewBox="0 0 80 120" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <!-- Stem -->
  <path d="M40 118 C40 92 39 75 40 52" stroke="#6a9a4a" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Left leaf -->
  <path d="M40 88 C28 80 14 76 10 68 C20 67 34 76 40 84Z" fill="#7aaa55" opacity="0.55"/>
  <!-- Right leaf -->
  <path d="M40 78 C52 70 66 65 70 57 C60 58 46 67 40 74Z" fill="#7aaa55" opacity="0.45"/>
  <!-- Back petals (wider, slightly darker) -->
  <path d="M40 52 C34 36 24 20 20 6 C20 -2 30 -4 35 4 C38 12 40 34 40 52Z" fill="#f0ede8" stroke="#d4c8be" stroke-width="0.5"/>
  <path d="M40 52 C46 36 56 20 60 6 C60 -2 50 -4 45 4 C42 12 40 34 40 52Z" fill="#f0ede8" stroke="#d4c8be" stroke-width="0.5"/>
  <!-- Side petals -->
  <path d="M40 52 C26 46 12 44 2 38 C-2 30 4 22 12 28 C22 36 34 46 40 52Z" fill="#f5f1ec" stroke="#d4c8be" stroke-width="0.5"/>
  <path d="M40 52 C54 46 68 44 78 38 C82 30 76 22 68 28 C58 36 46 46 40 52Z" fill="#f5f1ec" stroke="#d4c8be" stroke-width="0.5"/>
  <!-- Front petals -->
  <path d="M40 52 C30 58 20 66 12 76 C10 84 18 88 26 82 C34 74 38 60 40 52Z" fill="#faf8f4" stroke="#d4c8be" stroke-width="0.5"/>
  <path d="M40 52 C50 58 60 66 68 76 C70 84 62 88 54 82 C46 74 42 60 40 52Z" fill="#faf8f4" stroke="#d4c8be" stroke-width="0.5"/>
  <!-- Petal detail lines -->
  <path d="M35 6 C36 22 38 38 40 52" stroke="#d4c8be" stroke-width="0.4" stroke-linecap="round" opacity="0.6"/>
  <path d="M45 6 C44 22 42 38 40 52" stroke="#d4c8be" stroke-width="0.4" stroke-linecap="round" opacity="0.6"/>
  <path d="M4 30 C14 36 28 46 40 52" stroke="#d4c8be" stroke-width="0.4" stroke-linecap="round" opacity="0.5"/>
  <path d="M76 30 C66 36 52 46 40 52" stroke="#d4c8be" stroke-width="0.4" stroke-linecap="round" opacity="0.5"/>
  <!-- Stamens -->
  <line x1="40" y1="52" x2="34" y2="36" stroke="#c8a040" stroke-width="0.9" stroke-linecap="round"/>
  <line x1="40" y1="52" x2="38" y2="34" stroke="#c8a040" stroke-width="0.9" stroke-linecap="round"/>
  <line x1="40" y1="52" x2="42" y2="34" stroke="#c8a040" stroke-width="0.9" stroke-linecap="round"/>
  <line x1="40" y1="52" x2="46" y2="36" stroke="#c8a040" stroke-width="0.9" stroke-linecap="round"/>
  <line x1="40" y1="52" x2="40" y2="33" stroke="#c8a040" stroke-width="0.9" stroke-linecap="round"/>
  <!-- Anther tips (orange-gold) -->
  <ellipse cx="33.5" cy="35" rx="2" ry="3" fill="#e8940a" transform="rotate(-12 33.5 35)"/>
  <ellipse cx="37.5" cy="33" rx="2" ry="3" fill="#e8940a" transform="rotate(-4 37.5 33)"/>
  <ellipse cx="40" cy="32" rx="2" ry="3" fill="#e8940a"/>
  <ellipse cx="42.5" cy="33" rx="2" ry="3" fill="#e8940a" transform="rotate(4 42.5 33)"/>
  <ellipse cx="46.5" cy="35" rx="2" ry="3" fill="#e8940a" transform="rotate(12 46.5 35)"/>
</svg>

  <p class="label">до нашої зустрічі</p>

  <div class="timer">
    <div class="timer-unit">
      <span class="timer-digits" id="hours">00</span>
      <span class="timer-name">год</span>
    </div>
    <span class="timer-sep">:</span>
    <div class="timer-unit">
      <span class="timer-digits" id="minutes">00</span>
      <span class="timer-name">хв</span>
    </div>
    <span class="timer-sep">:</span>
    <div class="timer-unit">
      <span class="timer-digits" id="seconds">00</span>
      <span class="timer-name">сек</span>
    </div>
  </div>

  <div class="divider"></div>

  <p class="subtitle">ще трошки — і ми вже разом</p>

  <p class="signature">
    <!-- ПІДПИСИ — залиш один або кілька, решту видали -->
    <!-- варіанти нижче: -->
    <!-- — той, хто вже чекає -->
    <!-- — з теплом, твій ___ -->
    <!-- — твій ___ -->
    <!-- — з любов'ю, ___ -->
    той, хто думає про тебе
    <!-- — з посмішкою, ___ -->
    <!-- — до зустрічі, ___ -->
    <!-- — вже рахую хвилини, ___ -->
    <!-- — завжди твій ___ -->
    <!-- — назавжди твій ___ -->
  </p>
</div>

<!-- Celebration screen -->
<div class="celebration" id="celebration">
  <div class="confetti-wrap" id="confettiWrap"></div>
  <p class="celebration-text">нарешті! 🌸<br>сьогодні ми зустрічаємось</p>
  <p class="celebration-sub">цей момент вже тут</p>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────
const TARGET = new Date('2026-05-30T12:00:00'); // Kyiv time — adjust if needed

const MESSAGES = [
  "скоро побачимось 🌸",
  "я вже думаю про тебе 💛",
  "ще трошки — і ми разом ✨",
  "чекаю не дочекаюсь 🥰",
  "ти мені снишся 💭",
  "вже рахую години 🕐",
  "мені так добре поруч з тобою 🤍",
  "ти робиш мій день кращим 🌷",
  "скоро обійму тебе міцно 🫂",
  "💕",
  "чекати — то теж щастя, коли знаєш на кого 🌸",
  "вже уявляю як ми зустрінемось 💫",
  "ще трохи терпіння 🫶",
  "цей день буде особливим ✨",
  "думаю про твою посмішку 🥹",
  "поруч з тобою — моє улюблене місце 🤍",
  "скоро побачу тебе і буду щасливий 🌷",
  "від тебе — тепло навіть на відстані 🌸",
  "ось-ось 💫",
  "час іде, але я думаю про тебе весь час 🫂",
  "нарешті скоро! 🎀",
];

// ── TIMER ───────────────────────────────────────────
function pad(n) { return String(n).padStart(2,'0'); }

function updateTimer() {
  const now = new Date();
  const diff = TARGET - now;

  if (diff <= 0) {
    document.getElementById('hours').textContent   = '00';
    document.getElementById('minutes').textContent = '00';
    document.getElementById('seconds').textContent = '00';
    celebrate();
    return;
  }

  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);

  document.getElementById('hours').textContent   = pad(h);
  document.getElementById('minutes').textContent = pad(m);
  document.getElementById('seconds').textContent = pad(s);
}

updateTimer();
const timerInterval = setInterval(updateTimer, 1000);

// ── FLOATERS ────────────────────────────────────────
const floatersEl = document.getElementById('floaters');
const CARD_MARGIN = 60; // px clearance around centre card

function getCardBounds() {
  const card = document.querySelector('.card');
  const r = card.getBoundingClientRect();
  return {
    left: r.left - CARD_MARGIN,
    right: r.right + CARD_MARGIN,
    top: r.top - CARD_MARGIN,
    bottom: r.bottom + CARD_MARGIN,
  };
}

function randomEdgePos() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const cb = getCardBounds();
  let x, y, attempts = 0;
  do {
    x = Math.random() * (vw - 40) + 10;
    y = Math.random() * (vh - 40) + 10;
    attempts++;
  } while (
    x > cb.left && x < cb.right &&
    y > cb.top  && y < cb.bottom &&
    attempts < 30
  );
  return {x, y};
}

let msgIndex = 0;
const shuffled = [...MESSAGES].sort(() => Math.random() - 0.5);

function spawnFloater() {
  const el = document.createElement('div');
  el.className = 'floater';
  el.textContent = shuffled[msgIndex % shuffled.length];
  msgIndex++;

  const {x, y} = randomEdgePos();
  el.style.left = x + 'px';
  el.style.top  = y + 'px';
  el.style.transform = `rotate(${(Math.random()-0.5)*7}deg)`;

  floatersEl.appendChild(el);

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      el.classList.add('visible');
    });
  });

  setTimeout(() => {
    el.classList.remove('visible');
    setTimeout(() => el.remove(), 1400);
  }, 3800 + Math.random() * 2000);
}

// Spawn after initial load
setTimeout(() => {
  spawnFloater();
  setInterval(spawnFloater, 2600);
}, 2000);

// ── CELEBRATION ─────────────────────────────────────
let celebrated = false;

function celebrate() {
  if (celebrated) return;
  celebrated = true;
  clearInterval(timerInterval);

  const cel = document.getElementById('celebration');
  cel.classList.add('active');
  launchConfetti();
}

function launchConfetti() {
  const wrap = document.getElementById('confettiWrap');
  const emojis = ['🌸','💛','✨','🌷','💕','🫶','🎀','💫','🌿','🤍'];
  for (let i = 0; i < 55; i++) {
    const el = document.createElement('div');
    el.style.cssText = `
      position:absolute;
      left:${Math.random()*100}vw;
      bottom:-40px;
      font-size:${18 + Math.random()*22}px;
      --r:${(Math.random()-0.5)*60}deg;
      animation: floatUp ${3+Math.random()*4}s ease ${Math.random()*3}s forwards;
    `;
    el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    wrap.appendChild(el);
  }
}

// Prevent iOS bounce
document.body.addEventListener('touchmove', e => e.preventDefault(), {passive:false});
</script>
</body>
</html>
